<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Pose Landmarker - MediaPipe</title>
    <script>
        // Registrar Service Worker para cachear modelos
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker registrado:', registration);
                    })
                    .catch(error => {
                        console.log('Error registrando Service Worker:', error);
                    });
            });
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        #video {
            display: none;
        }
        #preview-wrapper {
            position: relative;
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            height: 70vh;
            min-height: 360px;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            z-index: 1;
            pointer-events: none;
            background-color: transparent;
        }
        #threejs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .status {
            margin-top: 20px;
            font-size: 18px;
            color: #007bff;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
        }
        #loading-overlay.hidden {
            display: none;
        }
        #progress-bar {
            width: 300px;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        #progress-fill {
            height: 100%;
            background-color: #007bff;
            width: 0%;
            transition: width 0.3s ease;
        }
        #loading-text {
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <h2>Cargando aplicación...</h2>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div id="loading-text">Descargando paquetes: 0/6</div>
    </div>
    <h1>Prototipo de Detección de Pose con MediaPipe</h1>
    <p>Esta página detecta poses corporales en tiempo real y muestra el esqueleto.</p>
    <button class="share-button" id="toggleSkeletonButton" onclick="toggleSkeleton()" style="background: #ff9800;">Ocultar esqueleto</button>
    <button class="share-button" id="toggleShirtButton" onclick="toggleShirt()" style="background: #007bff;">Ocultar camisa</button>
    <button class="share-button" id="togglePantsButton" onclick="togglePants()" style="background: #28a745;">Ocultar pantalón</button>
    <button class="share-button" id="toggleBackgroundButton" onclick="toggleBackground()" style="background: #6c757d;">Desactivar fondo</button>
    <button class="share-button" id="toggleMaskModeButton" onclick="toggleMaskMode()" style="background: #17a2b8;">Modo máscara normal</button>
    <button class="share-button" id="toggleVideoGlobalButton" onclick="toggleVideoGlobal()" style="background: #6610f2;">Ver video global</button>
    <video id="video" autoplay playsinline></video>
    <div id="preview-wrapper">
        <canvas id="canvas"></canvas>
        <div id="threejs-container"></div>
    </div>
    <div class="status" id="status">Cargando...</div>

    <script>
        // Dynamic script loading with progress
        const scripts = [
            'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js',
            'https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js'
        ];
        let loadedScripts = 0;
        const totalScripts = scripts.length;
        const progressFill = document.getElementById('progress-fill');
        const loadingText = document.getElementById('loading-text');
        const loadingOverlay = document.getElementById('loading-overlay');

        let modelsLoaded = 0;
        const totalModels = 3; // Pose, Hands, Face

        function updateProgress() {
            loadedScripts++;
            const percentage = (loadedScripts / totalScripts) * 50; // Scripts = primeros 50%
            progressFill.style.width = percentage + '%';
            loadingText.textContent = `Descargando paquetes: ${loadedScripts}/${totalScripts}`;
            if (loadedScripts === totalScripts) {
                setTimeout(() => {
                    loadingText.textContent = 'Cargando modelos de IA...';
                    startApp();
                }, 500);
            }
        }

        function updateModelProgress() {
            modelsLoaded++;
            const baseProgress = 50; // Scripts completados = 50%
            const modelProgress = (modelsLoaded / totalModels) * 50; // Modelos = otros 50%
            const totalPercentage = baseProgress + modelProgress;
            progressFill.style.width = totalPercentage + '%';
            loadingText.textContent = `Cargando modelos: ${modelsLoaded}/${totalModels}`;
            if (modelsLoaded === totalModels) {
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                }, 500);
            }
        }

        scripts.forEach(url => {
            const script = document.createElement('script');
            script.src = url;
            script.onload = updateProgress;
            script.onerror = () => {
                console.error('Error loading script:', url);
                updateProgress(); // Still count as loaded to avoid blocking
            };
            document.head.appendChild(script);
        });

        function startApp() {
            // Main app code starts here
            // Detectar si es dispositivo móvil
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

            const videoElement = document.getElementById('video');
            const canvasElement = document.getElementById('canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const statusElement = document.getElementById('status');
            const toggleSkeletonButton = document.getElementById('toggleSkeletonButton');
            const threejsContainer = document.getElementById('threejs-container');

            let pose;
            let hands;
            let face;
            let latestHandLandmarks = null;
            let latestFaceLandmarks = null;
            let drawSkeleton = true;
            let head = null;
            let showShirt = true;
            let showPants = true;
            let showBackground = true;
            let inverseMask = false;
            let showVideoGlobal = false;
            let videoPlane = null;
            let torso, leftArm, rightArm, leftLeg, rightLeg;
            let joints = {};
            let bones = [];
            let previousMapped = null;
            const snapThreshold = 0.28; // si el cambio es muy grande, evitar demasiada inercia

            let poseLoaded = false;
            let handsLoaded = false;
            let faceLoaded = false;

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            function getSmoothingFactor(delta) {
                if (delta > 0.50) {
                    // movimiento muy rápido → casi pegar
                    return 0.95;
                }
                if (delta > 0.25) {
                    // movimiento medio/rápido
                    return 0.8;
                }
                // movimiento lento → más suavizado estable
                return 0.5;
            }

            function smoothValue(prev, next) {
                const delta = Math.sqrt((next.x - prev.x) ** 2 + (next.y - prev.y) ** 2);
                if (delta > snapThreshold) {
                    return next;
                }
                const factor = getSmoothingFactor(delta);
                return {
                    x: lerp(prev.x, next.x, factor),
                    y: lerp(prev.y, next.y, factor),
                    visible: next.visible
                };
            }

            function clamp01(v) {
                return Math.min(1, Math.max(0, v));
            }

            function isLandmarkVisible(landmark) {
                if (!landmark) return false;
                if (landmark.visibility === undefined || landmark.visibility === null) return true;
                return clamp01(landmark.visibility) > 0.2;
            }

            function updateRenderSize() {
                const wrapper = document.getElementById('preview-wrapper');
                const width = wrapper.clientWidth;
                const height = wrapper.clientHeight;
                canvasElement.width = width * window.devicePixelRatio;
            canvasElement.height = height * window.devicePixelRatio;
            canvasElement.style.width = width + 'px';
            canvasElement.style.height = height + 'px';

            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);

            const aspect = width / height;
            currentAspect = aspect;
            camera.left = -aspect;
            camera.right = aspect;
            camera.top = 1;
            camera.bottom = -1;
            camera.updateProjectionMatrix();

            // Ajuste de plano de video para cubrir toda el área de cámara
            if (videoPlane) {
                videoPlane.scale.set(aspect, 1, 1);
                videoPlane.position.set(0, 0, -0.05);
            }

            // Si el video no coincide con la proporción, ajusta el wrapper para mantenerlo.
            if (videoElement.videoWidth && videoElement.videoHeight) {
                const videoAspect = videoElement.videoWidth / videoElement.videoHeight;
                const wrapper = document.getElementById('preview-wrapper');
                wrapper.style.height = (wrapper.clientWidth / videoAspect) + 'px';
            }
        }

        function createMaskCanvas(mask) {
            let maskCanvas;
            if (mask instanceof HTMLCanvasElement) {
                maskCanvas = mask;
            } else if (mask instanceof ImageBitmap) {
                maskCanvas = document.createElement('canvas');
                maskCanvas.width = mask.width;
                maskCanvas.height = mask.height;
                const maskCtx = maskCanvas.getContext('2d');
                maskCtx.drawImage(mask, 0, 0);
            } else if (mask && mask.data && mask.width && mask.height) {
                const maskDataUint8 = new Uint8ClampedArray(mask.data.length * 4);
                for (let i = 0; i < mask.data.length; i++) {
                    const value = Math.max(0, Math.min(1, mask.data[i]));
                    maskDataUint8[i*4 + 0] = value * 255;
                    maskDataUint8[i*4 + 1] = value * 255;
                    maskDataUint8[i*4 + 2] = value * 255;
                    maskDataUint8[i*4 + 3] = 255;
                }
                const maskImageData = new ImageData(maskDataUint8, mask.width, mask.height);
                maskCanvas = document.createElement('canvas');
                maskCanvas.width = mask.width;
                maskCanvas.height = mask.height;
                const maskCtx = maskCanvas.getContext('2d');
                maskCtx.putImageData(maskImageData, 0, 0);
            } else {
                console.warn('Formato de máscara de segmentación no reconocido:', mask);
            }
            return maskCanvas;
        }

        function enhanceMaskWithHandAndFace(maskCanvas) {
            if (!maskCanvas) return;
            const ctx = maskCanvas.getContext('2d');

            // Primero dibujamos región completa de manos (path) para evitar “huecos” entre dedos
            if (latestHandLandmarks && latestHandLandmarks.length > 0) {
                ctx.save();
                ctx.fillStyle = 'rgba(255,255,255,1)';
                ctx.strokeStyle = 'rgba(255,255,255,1)';
                ctx.lineWidth = Math.max(1, Math.min(6, maskCanvas.width*0.005));

                latestHandLandmarks.forEach(hand => {
                    if (!hand || hand.length < 2) return;

                    // Construye polígono / malla de mano
                    ctx.beginPath();
                    const startPoint = hand[0];
                    ctx.moveTo(startPoint.x * maskCanvas.width, startPoint.y * maskCanvas.height);

                    for (let i = 1; i < hand.length; i++) {
                        const p = hand[i];
                        ctx.lineTo(p.x * maskCanvas.width, p.y * maskCanvas.height);
                    }
                    ctx.closePath();

                    ctx.fill();
                    ctx.stroke();

                    // Enfina adicionalmente contorno de dedos con líneas (hand skeleton)
                    const fingerOrders = [
                        [0,1,2,3,4],    // pulgar
                        [0,5,6,7,8],    // índice
                        [0,9,10,11,12], // medio
                        [0,13,14,15,16],// anular
                        [0,17,18,19,20] // meñique
                    ];
                    ctx.beginPath();
                    fingerOrders.forEach(path => {
                        const origin = hand[path[0]];
                        ctx.moveTo(origin.x * maskCanvas.width, origin.y * maskCanvas.height);
                        path.slice(1).forEach(idx => {
                            const p2 = hand[idx];
                            ctx.lineTo(p2.x * maskCanvas.width, p2.y * maskCanvas.height);
                        });
                    });
                    ctx.stroke();
                });

                ctx.restore();
            }

            // Refuerza región de cara (naso-ojos) para mantener mejor zócalos
            if (latestFaceLandmarks && latestFaceLandmarks.length > 0) {
                const nose = latestFaceLandmarks[1];
                const leftCheek = latestFaceLandmarks[234];
                const rightCheek = latestFaceLandmarks[454];
                const chin = latestFaceLandmarks[152];
                if (nose && leftCheek && rightCheek && chin) {
                    const centerX = nose.x * maskCanvas.width;
                    const centerY = nose.y * maskCanvas.height;
                    const width = Math.abs(rightCheek.x - leftCheek.x) * maskCanvas.width * 1.1;
                    const height = Math.abs(chin.y - nose.y) * maskCanvas.height * 1.4;

                    ctx.save();
                    ctx.fillStyle = 'rgba(255,255,255,1)';
                    ctx.beginPath();
                    ctx.ellipse(centerX, centerY, width/2, height/2, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        function applySoftSegmentationMask(ctx, maskCanvas, width, height, inverse) {
            // Mejora máscara con datos de manos y cara (por cada dedo/rostro) antes de difuminar.
            enhanceMaskWithHandAndFace(maskCanvas);

            // Suaviza bordes y reduce “estela blanca” al recortar el cuerpo.
            const temp = document.createElement('canvas');
            temp.width = maskCanvas.width;
            temp.height = maskCanvas.height;
            const tempCtx = temp.getContext('2d');
            tempCtx.filter = 'blur(4px)';
            tempCtx.drawImage(maskCanvas, 0, 0);

            ctx.save();
            ctx.globalCompositeOperation = inverse ? 'destination-in' : 'destination-out';
            ctx.drawImage(temp, 0, 0, width, height);
            ctx.restore();
            ctx.globalCompositeOperation = 'source-over';
        }

        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            threejsContainer.appendChild(renderer.domElement);
            updateRenderSize();
            window.addEventListener('resize', updateRenderSize);

            // Luz para iluminación
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(0, 0, 1);
            scene.add(directionalLight);

            // Plano para cuerpo segmentado
            const segmentedMaterial = new THREE.MeshBasicMaterial({ transparent: true, alphaTest: 0.1 });
            videoPlane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), segmentedMaterial);
            videoPlane.position.z = -0.05;
            scene.add(videoPlane);

            // Materiales para ropa con iluminación
            const material = new THREE.MeshStandardMaterial({ color: 0xff0000, transparent: true, opacity: 0.6, roughness: 0.5, metalness: 0.1 });

            // Torso (plano)
            const torsoGeometry = new THREE.PlaneGeometry(0.2, 0.3);
            torso = new THREE.Mesh(torsoGeometry, material.clone());
            torso.material.color.setHex(0x00ff00);
            torso.castShadow = true;
            torso.receiveShadow = true;
            scene.add(torso);

            // Brazos (cilindros)
            const armGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.2, 8);
            leftArm = new THREE.Mesh(armGeometry, material.clone());
            leftArm.material.color.setHex(0x0000ff);
            leftArm.castShadow = true;
            leftArm.receiveShadow = true;
            scene.add(leftArm);

            rightArm = new THREE.Mesh(armGeometry, material.clone());
            rightArm.material.color.setHex(0x0000ff);
            rightArm.castShadow = true;
            rightArm.receiveShadow = true;
            scene.add(rightArm);

            // Piernas (cilindros)
            const legGeometry = new THREE.CylinderGeometry(0.03, 0.03, 0.3, 8);
            leftLeg = new THREE.Mesh(legGeometry, material.clone());
            leftLeg.material.color.setHex(0xff00ff);
            leftLeg.castShadow = true;
            leftLeg.receiveShadow = true;
            scene.add(leftLeg);

            rightLeg = new THREE.Mesh(legGeometry, material.clone());
            rightLeg.material.color.setHex(0xff00ff);
            rightLeg.castShadow = true;
            rightLeg.receiveShadow = true;
            scene.add(rightLeg);

            // Cabeza (esfera)
            const headGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            head = new THREE.Mesh(headGeometry, material.clone());
            head.material.color.setHex(0xffff00);
            head.castShadow = true;
            head.receiveShadow = true;
            head.visible = true;
            scene.add(head);

            // Joints del esqueleto (esferas pequeñas)
            const jointNames = ['leftShoulder','rightShoulder','leftElbow','rightElbow','leftWrist','leftHip','rightHip','leftKnee','rightKnee','leftAnkle','rightAnkle'];
            const jointGeo = new THREE.SphereGeometry(0.012, 8, 8);
            const jointMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            jointNames.forEach(name => {
                const m = new THREE.Mesh(jointGeo, jointMat.clone());
                m.visible = false;
                scene.add(m);
                joints[name] = m;
            });

            // Bones (líneas) para conectar joints
            const bonePairs = [
                ['leftShoulder','rightShoulder'],
                ['leftHip','rightHip'],
                ['leftShoulder','leftElbow'],
                ['leftElbow','leftWrist'],
                ['rightShoulder','rightElbow'],
                ['rightElbow','rightWrist'],
                ['leftHip','leftKnee'],
                ['leftKnee','leftAnkle'],
                ['rightHip','rightKnee'],
                ['rightKnee','rightAnkle']
            ];

            bonePairs.forEach(pair => {
                const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
                const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
                scene.add(line);
                bones.push({ from: pair[0], to: pair[1], line });
            });
        }

        function toggleSkeleton() {
            drawSkeleton = !drawSkeleton;
            toggleSkeletonButton.textContent = drawSkeleton ? 'Ocultar esqueleto' : 'Mostrar esqueleto';
        }

        function toggleShirt() {
            showShirt = !showShirt;
            torso.visible = showShirt;
            document.getElementById('toggleShirtButton').textContent = showShirt ? 'Ocultar camisa' : 'Mostrar camisa';
        }

        function togglePants() {
            showPants = !showPants;
            if (leftLeg) leftLeg.visible = showPants;
            if (rightLeg) rightLeg.visible = showPants;
            document.getElementById('togglePantsButton').textContent = showPants ? 'Ocultar pantalón' : 'Mostrar pantalón';
        }

        function toggleBackground() {
            showBackground = !showBackground;
            document.getElementById('toggleBackgroundButton').textContent = showBackground ? 'Desactivar fondo' : 'Activar fondo';
        }

        function toggleMaskMode() {
            inverseMask = !inverseMask;
            document.getElementById('toggleMaskModeButton').textContent = inverseMask ? 'Modo máscara inversa' : 'Modo máscara normal';
        }

        function toggleVideoGlobal() {
            showVideoGlobal = !showVideoGlobal;
            document.getElementById('toggleVideoGlobalButton').textContent = showVideoGlobal ? 'Ver video recortado' : 'Ver video global';
            if (videoPlane) {
                videoPlane.visible = !showVideoGlobal;
            }
        }

        function onHandsResults(results) {
            if (!handsLoaded) {
                handsLoaded = true;
                updateModelProgress();
            }
            latestHandLandmarks = results.multiHandLandmarks || null;
            if (latestHandLandmarks && latestHandLandmarks.length) {
                statusElement.textContent = 'Manos detectadas: ' + latestHandLandmarks.length;
            }
        }

        function onFaceResults(results) {
            if (!faceLoaded) {
                faceLoaded = true;
                updateModelProgress();
            }
            latestFaceLandmarks = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null;
        }

        async function onResults(results) {
            if (!poseLoaded) {
                poseLoaded = true;
                updateModelProgress();
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            // Dibujar video completo (según toggle) sin recorte.
            if (showVideoGlobal) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

                if (results.poseLandmarks && results.poseLandmarks.length >= 29) {
                    if (drawSkeleton) {
                        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
                    }
                    // Siempre dibujar manos en modo global si hay datos
                    if (latestHandLandmarks) {
                        latestHandLandmarks.forEach(hand => {
                            drawConnectors(canvasCtx, hand, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 2});
                            drawLandmarks(canvasCtx, hand, {color: '#FF00FF', lineWidth: 1});
                        });
                    }
                    // Dibujar cara en modo global si hay datos
                    if (latestFaceLandmarks) {
                        drawConnectors(canvasCtx, latestFaceLandmarks, FACEMESH_CONTOURS, {color: '#FFFF00', lineWidth: 1});
                        drawLandmarks(canvasCtx, latestFaceLandmarks, {color: '#FFA500', lineWidth: 1});
                    }
                    updateClothing(results.poseLandmarks);
                }

                renderer.render(scene, camera);
                canvasCtx.restore();
                return;
            }

            if (showBackground) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            }

            if (results.poseLandmarks && results.poseLandmarks.length >= 29) {
                statusElement.textContent = drawSkeleton ? 'Cuerpo detectado - Mostrando esqueleto' : 'Cuerpo detectado - Esqueleto oculto';

                // Aplicar máscara para cuerpo/fondo según modo con bordes suavizados
                if (results.segmentationMask) {
                    const maskCanvas = createMaskCanvas(results.segmentationMask);
                    if (maskCanvas) {
                        applySoftSegmentationMask(canvasCtx, maskCanvas, canvasElement.width, canvasElement.height, inverseMask);
                    }
                }

                if (drawSkeleton) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
                    if (latestHandLandmarks) {
                        latestHandLandmarks.forEach(hand => {
                            drawConnectors(canvasCtx, hand, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 2});
                            drawLandmarks(canvasCtx, hand, {color: '#FF00FF', lineWidth: 1});
                        });
                    }
                    if (latestFaceLandmarks) {
                        drawConnectors(canvasCtx, latestFaceLandmarks, FACEMESH_CONTOURS, {color: '#FFFF00', lineWidth: 1});
                        drawLandmarks(canvasCtx, latestFaceLandmarks, {color: '#FFA500', lineWidth: 1});
                    }
                }

                // Actualizar textura segmentada para videoPlane (con bordes suaves)
                if (results.segmentationMask && videoPlane) {
                    const maskCanvas = createMaskCanvas(results.segmentationMask);
                    if (maskCanvas) {
                        enhanceMaskWithHandAndFace(maskCanvas);
                        const combinedCanvas = document.createElement('canvas');
                        combinedCanvas.width = results.image.width;
                        combinedCanvas.height = results.image.height;
                        const combinedCtx = combinedCanvas.getContext('2d');
                        combinedCtx.drawImage(results.image, 0, 0);

                        const smoothMask = document.createElement('canvas');
                        smoothMask.width = maskCanvas.width;
                        smoothMask.height = maskCanvas.height;
                        const smoothCtx = smoothMask.getContext('2d');
                        smoothCtx.filter = 'blur(4px)';
                        smoothCtx.drawImage(maskCanvas, 0, 0);

                        combinedCtx.globalCompositeOperation = 'destination-in';
                        combinedCtx.drawImage(smoothMask, 0, 0, combinedCanvas.width, combinedCanvas.height);

                        const segmentedTexture = new THREE.CanvasTexture(combinedCanvas);
                        videoPlane.material.map = segmentedTexture;
                        videoPlane.material.needsUpdate = true;
                    }
                }

                // Actualizar objetos 3D
                updateClothing(results.poseLandmarks);
                renderer.render(scene, camera);
            } else {
                statusElement.textContent = 'No se detecta cuerpo - Asegúrate de estar frente a la cámara';
            }
            canvasCtx.restore();
        }

        function updateClothing(landmarks) {
            if (!landmarks || landmarks.length < 29) {
                return;
            }

            const indexMap = {
                leftShoulder: 11,
                rightShoulder: 12,
                leftElbow: 13,
                rightElbow: 14,
                leftWrist: 15,
                rightWrist: 16,
                leftHip: 23,
                rightHip: 24,
                leftKnee: 25,
                rightKnee: 26,
                leftAnkle: 27,
                rightAnkle: 28
            };

            function toThreeJS(x, y) {
                return {
                    x: (x - 0.5) * 2 * currentAspect,
                    y: -(y - 0.5) * 2
                };
            }

            const raw = {};
            Object.keys(indexMap).forEach(key => {
                const lm = landmarks[indexMap[key]];
                raw[key] = toThreeJS(clamp01(lm.x), clamp01(lm.y));
                raw[key].visible = isLandmarkVisible(lm);
            });

            // Refinar wrists con hand landmarks para mayor precisión
            if (latestHandLandmarks && latestHandLandmarks.length > 0) {
                latestHandLandmarks.forEach(hand => {
                    if (hand && hand.length > 0) {
                        const wristHand = hand[0]; // landmark 0: muñeca
                        const handX = wristHand.x;
                        // Determinar si es mano izquierda o derecha basado en proximidad al wrist de pose
                        const leftWristDist = Math.abs(handX - landmarks[15].x); // leftWrist pose
                        const rightWristDist = Math.abs(handX - landmarks[16].x); // rightWrist pose
                        const targetKey = leftWristDist < rightWristDist ? 'leftWrist' : 'rightWrist';
                        raw[targetKey] = toThreeJS(clamp01(wristHand.x), clamp01(wristHand.y));
                        raw[targetKey].visible = true; // asumir visible si detectada
                    }
                });
            }

            const mapped = {};
            Object.keys(raw).forEach(key => {
                if (previousMapped && previousMapped[key]) {
                    mapped[key] = smoothValue(previousMapped[key], raw[key]);
                } else {
                    mapped[key] = raw[key];
                }
            });

            previousMapped = JSON.parse(JSON.stringify(mapped));

            Object.keys(mapped).forEach(key => {
                const p = mapped[key];
                const joint = joints[key];
                if (!joint) return;
                joint.position.set(p.x, p.y, 0.03);
                joint.visible = p.visible;
            });

            bones.forEach(b => {
                const jointFrom = joints[b.from];
                const jointTo = joints[b.to];
                if (!jointFrom || !jointTo) return;
                const p1 = jointFrom.position;
                const p2 = jointTo.position;
                b.line.geometry.setFromPoints([p1, p2]);
                b.line.geometry.attributes.position.needsUpdate = true;
            });

            const torsoX = (mapped.leftShoulder.x + mapped.rightShoulder.x + mapped.leftHip.x + mapped.rightHip.x) / 4;
            const torsoY = (mapped.leftShoulder.y + mapped.rightShoulder.y + mapped.leftHip.y + mapped.rightHip.y) / 4;
            const torsoWidth = Math.max(0.3, Math.abs(mapped.rightShoulder.x - mapped.leftShoulder.x) * 1.2);
            const torsoHeight = Math.max(0.35, Math.abs(mapped.leftHip.y - mapped.leftShoulder.y) * 1.2);
            torso.position.set(torsoX, torsoY, 0.01);
            torso.scale.set(torsoWidth / 0.2, torsoHeight / 0.3, 1);
            torso.visible = showShirt;
            leftLeg.visible = showPants;
            rightLeg.visible = showPants;

            // Ajuste de cabeza/cuello con FaceMesh
            if (latestFaceLandmarks && latestFaceLandmarks.length > 0) {
                const nose = latestFaceLandmarks[1]; // nariz cerca del centro
                const leftEye = latestFaceLandmarks[33];
                const rightEye = latestFaceLandmarks[263];
                if (nose && leftEye && rightEye && head) {
                    const faceCenter3D = toThreeJS(clamp01(nose.x), clamp01(nose.y));
                    const eyeCenterX = (leftEye.x + rightEye.x) / 2;
                    const eyeCenterY = (leftEye.y + rightEye.y) / 2;
                    const eyeCenter3D = toThreeJS(clamp01(eyeCenterX), clamp01(eyeCenterY));

                    const faceWidth = Math.sqrt((rightEye.x - leftEye.x) ** 2 + (rightEye.y - leftEye.y) ** 2);
                    const headRadius = Math.max(0.08, faceWidth * 0.35);

                    const roll = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);
                    const yaw = (nose.x - eyeCenterX) * 1.5;
                    const pitch = (eyeCenterY - nose.y) * 1.2;

                    head.position.set(faceCenter3D.x, faceCenter3D.y + 0.08, 0.02);
                    head.scale.set(headRadius, headRadius, headRadius);
                    head.rotation.set(pitch, yaw, -roll);
                }
            } else if (mapped.leftShoulder && mapped.rightShoulder && head) {
                // Fallback en base a hombros si no hay cara
                const shoulderCenter = {
                    x: (mapped.leftShoulder.x + mapped.rightShoulder.x) / 2,
                    y: (mapped.leftShoulder.y + mapped.rightShoulder.y) / 2
                };
                head.position.set(shoulderCenter.x, shoulderCenter.y + 0.28, 0.02);
                head.scale.set(0.1, 0.1, 0.1);
                head.rotation.set(0, 0, 0);
            }

            const la = mapped.leftShoulder;
            const lw = mapped.leftWrist;
            const ra = mapped.rightShoulder;
            const rw = mapped.rightWrist;
            const lh = mapped.leftHip;
            const la2 = mapped.leftAnkle;
            const rh = mapped.rightHip;
            const ra2 = mapped.rightAnkle;

            if (la && lw) {
                const leftArmLength = Math.sqrt((lw.x - la.x) ** 2 + (lw.y - la.y) ** 2);
                leftArm.scale.set(1, Math.max(leftArmLength / 0.2, 0.1), 1);
                leftArm.position.set((la.x + lw.x) / 2, (la.y + lw.y) / 2, 0.015);
                leftArm.rotation.z = Math.atan2(lw.y - la.y, lw.x - la.x) - Math.PI / 2;
                leftArm.visible = showShirt && la.visible && lw.visible;
            }

            if (ra && rw) {
                const rightArmLength = Math.sqrt((rw.x - ra.x) ** 2 + (rw.y - ra.y) ** 2);
                rightArm.scale.set(1, Math.max(rightArmLength / 0.2, 0.1), 1);
                rightArm.position.set((ra.x + rw.x) / 2, (ra.y + rw.y) / 2, 0.015);
                rightArm.rotation.z = Math.atan2(rw.y - ra.y, rw.x - ra.x) - Math.PI / 2;
                rightArm.visible = showShirt && ra.visible && rw.visible;
            }

            if (lh && la2) {
                const leftLegLength = Math.sqrt((la2.x - lh.x) ** 2 + (la2.y - lh.y) ** 2);
                leftLeg.scale.set(1, Math.max(leftLegLength / 0.3, 0.1), 1);
                leftLeg.position.set((lh.x + la2.x) / 2, (lh.y + la2.y) / 2, 0.015);
                leftLeg.rotation.z = Math.atan2(la2.y - lh.y, la2.x - lh.x) - Math.PI / 2;
                leftLeg.visible = showPants && lh.visible && la2.visible;
            }

            if (rh && ra2) {
                const rightLegLength = Math.sqrt((ra2.x - rh.x) ** 2 + (ra2.y - rh.y) ** 2);
                rightLeg.scale.set(1, Math.max(rightLegLength / 0.3, 0.1), 1);
                rightLeg.position.set((rh.x + ra2.x) / 2, (rh.y + ra2.y) / 2, 0.015);
                rightLeg.rotation.z = Math.atan2(ra2.y - rh.y, ra2.x - rh.x) - Math.PI / 2;
                rightLeg.visible = showPants && rh.visible && ra2.visible;
            }
        }

        async function initPose() {
            initThreeJS();

            // Brazo derecho
            const ra = mapped.rightShoulder;
            const rw = mapped.rightWrist;
            const rightArmLength = Math.sqrt((rw.x - ra.x) ** 2 + (rw.y - ra.y) ** 2);
            rightArm.scale.set(1, Math.max(rightArmLength / 0.2, 0.1), 1);
            rightArm.position.set((ra.x + rw.x) / 2, (ra.y + rw.y) / 2, 0.015);
            rightArm.rotation.z = Math.atan2(rw.y - ra.y, rw.x - ra.x) - Math.PI / 2;

            // Pierna izquierda
            const lh = mapped.leftHip;
            const la2 = mapped.leftAnkle;
            const leftLegLength = Math.sqrt((la2.x - lh.x) ** 2 + (la2.y - lh.y) ** 2);
            leftLeg.scale.set(1, Math.max(leftLegLength / 0.3, 0.1), 1);
            leftLeg.position.set((lh.x + la2.x) / 2, (lh.y + la2.y) / 2, 0.015);
            leftLeg.rotation.z = Math.atan2(la2.y - lh.y, la2.x - lh.x) - Math.PI / 2;

            // Pierna derecha
            const rh = mapped.rightHip;
            const ra2 = mapped.rightAnkle;
            const rightLegLength = Math.sqrt((ra2.x - rh.x) ** 2 + (ra2.y - rh.y) ** 2);
            rightLeg.scale.set(1, Math.max(rightLegLength / 0.3, 0.1), 1);
            rightLeg.position.set((rh.x + ra2.x) / 2, (rh.y + ra2.y) / 2, 0.015);
            rightLeg.rotation.z = Math.atan2(ra2.y - rh.y, ra2.x - rh.x) - Math.PI / 2;
        }

        async function initPose() {
            initThreeJS();

            console.log('Dispositivo móvil detectado:', isMobile);
            if (isMobile) {
                statusElement.textContent = 'Modo móvil activado - Rendimiento optimizado';
            } else {
                statusElement.textContent = 'Cargando... (Los modelos se cachearán para futuras visitas)';
            }

            pose = new Pose({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
                }
            });
            pose.setOptions({
                modelComplexity: isMobile ? 0 : 1,
                smoothLandmarks: true,
                enableSegmentation: !isMobile, // Desactivar segmentación en móvil para mejor rendimiento
                smoothSegmentation: !isMobile,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            pose.onResults(onResults);

            if (!window.Pose) console.error('MediaPipe Pose no cargado');
            if (!window.Hands) console.error('MediaPipe Hands no cargado');


            hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`;
                }
            });
            hands.setOptions({
                maxNumHands: isMobile ? 1 : 2, // Solo una mano en móvil
                modelComplexity: isMobile ? 0 : 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            hands.onResults(onHandsResults);

            face = new FaceMesh({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`;
                }
            });
            face.setOptions({
                maxNumFaces: 1,
                refineLandmarks: !isMobile, // Desactivar refinamiento en móvil
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            face.onResults(onFaceResults);

            videoElement.onloadedmetadata = () => {
                updateRenderSize();
            };

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({image: videoElement});
                    await hands.send({image: videoElement});
                    await face.send({image: videoElement});
                },
                width: isMobile ? 320 : 640, // Resolución más baja en móvil
                height: isMobile ? 240 : 480
            });
            camera.start();

            updateRenderSize();
        }

        initPose();
        }
    </script>
