<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Pose Landmarker - MediaPipe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        #video {
            display: none;
        }
        #canvas {
            border: 2px solid #333;
            max-width: 100%;
            height: auto;
        }
        #threeCanvas {
            border: 2px solid #333;
            margin-top: 20px;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 0 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .status {
            margin-top: 20px;
            font-size: 18px;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>Prototipo de Detección de Pose con MediaPipe</h1>
    <p>Esta página detecta poses corporales en tiempo real y muestra el esqueleto.</p>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <canvas id="threeCanvas" width="640" height="480"></canvas>
    <div class="controls">
        <button id="toggleSkeleton">Ocultar Esqueleto</button>
    </div>
    <div class="status" id="status">Cargando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js"></script>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusElement = document.getElementById('status');
        const toggleButton = document.getElementById('toggleSkeleton');

        let pose;
        let showSkeleton = true;
        let scene, camera, renderer, cube;

        // Toggle skeleton
        toggleButton.addEventListener('click', () => {
            showSkeleton = !showSkeleton;
            toggleButton.textContent = showSkeleton ? 'Ocultar Esqueleto' : 'Mostrar Esqueleto';
        });

        // Three.js setup
        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, 640 / 480, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('threeCanvas') });
            renderer.setSize(640, 480);

            const geometry = new THREE.BoxGeometry(1, 2, 0.5); // Cubo rectangular
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            camera.position.z = 5;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function calculateTorsoRotation(landmarks) {
            const leftShoulder = landmarks[11];
            const rightShoulder = landmarks[12];
            const leftHip = landmarks[23];
            const rightHip = landmarks[24];

            // Centro de hombros
            const shoulderCenterX = (leftShoulder.x + rightShoulder.x) / 2;
            const shoulderCenterY = (leftShoulder.y + rightShoulder.y) / 2;

            // Centro de caderas
            const hipCenterX = (leftHip.x + rightHip.x) / 2;
            const hipCenterY = (leftHip.y + rightHip.y) / 2;

            // Vector del torso (de caderas a hombros)
            const torsoVectorX = shoulderCenterX - hipCenterX;
            const torsoVectorY = shoulderCenterY - hipCenterY;

            // Ángulo de rotación en Y (izquierda-derecha)
            const angle = Math.atan2(torsoVectorX, torsoVectorY);

            return angle;
        }

        async function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                statusElement.textContent = 'Cuerpo detectado - Mostrando esqueleto';
                if (showSkeleton) {
                    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
                }

                // Rotar el cubo basado en el torso
                const torsoRotation = calculateTorsoRotation(results.poseLandmarks);
                cube.rotation.y = torsoRotation;
            } else {
                statusElement.textContent = 'No se detecta cuerpo - Asegúrate de estar frente a la cámara';
            }
            canvasCtx.restore();
        }

        async function initPose() {
            pose = new Pose({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
                }
            });
            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: false,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            pose.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();

            canvasElement.width = 640;
            canvasElement.height = 480;

            initThreeJS();
        }

        initPose();
    </script>
</body>
</html>
