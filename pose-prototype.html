<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Pose Landmarker - TodoFarma</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675469404/drawing_utils.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        .container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
        }
        #video {
            width: 640px;
            height: 480px;
            border: 1px solid #ccc;
            position: relative;
        }
        .video-container {
            position: relative;
        }
        #canvas {
            width: 640px;
            height: 480px;
            border: 1px solid #ccc;
        }
        .info {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Prototipo Pose Landmarker con Three.js</h1>
    <div class="container">
        <div>
            <h2>Cámara</h2>
            <div class="video-container">
                <video id="video" autoplay></video>
                <canvas id="overlay"></canvas>
            </div>
        </div>
        <div>
            <h2>Modelo 3D Animado</h2>
            <canvas id="canvas"></canvas>
        </div>
    </div>
    <div class="info">
        <p>Permite acceso a la cámara para detectar poses. El cubo en 3D se rota basado en la pose de los brazos.</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js';

        // Inicializar Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 640 / 480, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas') });
        renderer.setSize(640, 480);

        // Crear 4 cubos para cabeza, torso, brazo izq, brazo der
        const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const headMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // Rojo
        const torsoMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff }); // Azul
        const leftArmMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 }); // Verde
        const rightArmMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 }); // Amarillo

        const head = new THREE.Mesh(geometry, headMaterial);
        const torso = new THREE.Mesh(geometry, torsoMaterial);
        const leftArm = new THREE.Mesh(geometry, leftArmMaterial);
        const rightArm = new THREE.Mesh(geometry, rightArmMaterial);

        scene.add(head);
        scene.add(torso);
        scene.add(leftArm);
        scene.add(rightArm);

        camera.position.z = 5;

        // Función para animar los 4 cubos
        function animateCubes(landmarks) {
            if (!landmarks || landmarks.length === 0) return;

            // Cabeza: posición promedio de ojos
            const leftEye = landmarks[1];
            const rightEye = landmarks[2];
            if (leftEye && rightEye) {
                head.position.x = ((leftEye.x + rightEye.x) / 2 - 0.5) * 10;
                head.position.y = -((leftEye.y + rightEye.y) / 2 - 0.5) * 10; // Invertir Y
                head.position.z = 0;
            }

            // Torso: posición promedio de hombros y caderas
            const leftShoulder = landmarks[11];
            const rightShoulder = landmarks[12];
            const leftHip = landmarks[23];
            const rightHip = landmarks[24];
            if (leftShoulder && rightShoulder && leftHip && rightHip) {
                torso.position.x = ((leftShoulder.x + rightShoulder.x + leftHip.x + rightHip.x) / 4 - 0.5) * 10;
                torso.position.y = -((leftShoulder.y + rightShoulder.y + leftHip.y + rightHip.y) / 4 - 0.5) * 10;
                torso.position.z = 0;
            }

            // Brazo izquierdo: posición en hombro izquierdo
            if (leftShoulder) {
                leftArm.position.x = (leftShoulder.x - 0.5) * 10;
                leftArm.position.y = -(leftShoulder.y - 0.5) * 10;
                leftArm.position.z = 0;
            }

            // Brazo derecho: posición en hombro derecho
            if (rightShoulder) {
                rightArm.position.x = (rightShoulder.x - 0.5) * 10;
                rightArm.position.y = -(rightShoulder.y - 0.5) * 10;
                rightArm.position.z = 0;
            }

            renderer.render(scene, camera);
        }

        // Inicializar MediaPipe Pose
        const pose = new window.Pose({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
            }
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            smoothSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            // Dibujar esqueleto en el overlay
            const canvasElement = document.getElementById('overlay');
            const canvasCtx = canvasElement.getContext('2d');
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.poseLandmarks) {
                window.drawConnectors(canvasCtx, results.poseLandmarks, window.POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                window.drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
                animateCubes(results.poseLandmarks);
            }
            canvasCtx.restore();
        });

        // Configurar cámara
        async function setupCamera() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    processFrame();
                };
            } catch (error) {
                console.error('Error accessing camera:', error);
            }
        }

        function processFrame() {
            const video = document.getElementById('video');
            if (video.readyState >= 2) {
                pose.send({ image: video });
            }
            requestAnimationFrame(processFrame);
        }

        setupCamera();

        // Animar continuamente
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html></content>
