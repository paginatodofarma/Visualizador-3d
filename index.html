<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - TodoFarma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        .viewer-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        model-viewer {
            width: 100%;
            height: 500px;
        }
        .model-list {
            margin-top: 20px;
        }
        .model-list ul {
            list-style: none;
            padding: 0;
        }
        .model-list li {
            margin: 10px 0;
            padding: 10px;
            background: #e9e9e9;
            border-radius: 4px;
            cursor: pointer;
        }
        .model-list li:hover {
            background: #d9d9d9;
        }
        .share-button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .share-button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Visualizador 3D de Modelos GLB</h1>
    <div class="viewer-container">
        <model-viewer
            id="modelViewer"
            alt="Modelo 3D"
            ar
            ar-modes="webxr scene-viewer quick-look"
            ar-scale="auto"
            camera-controls
            auto-rotate
            shadow-intensity="1">
        </model-viewer>
        <button class="share-button" onclick="shareCurrentModel()">Compartir Enlace del Modelo Actual</button>
        <button class="share-button" onclick="openPosePrototype()" style="margin-left: 10px;">Prototipo Pose Landmarker</button>
        <div class="model-list">
            <h2>Modelos Disponibles</h2>
            <ul id="modelList">
                <li onclick="loadModel('Modelos/prueba.glb')">prueba.glb</li>
                <!-- Agregar más modelos aquí -->
            </ul>
        </div>
    </div>

    <script>
        // Configura tu usuario y repositorio de GitHub aquí
        const owner = 'paginatodofarma'; // Tu nombre de usuario de GitHub
        const repo = 'Visualizador-3d'; // Nombre de tu repositorio
        const branch = 'main'; // Rama principal, usualmente 'main' o 'master'

        let currentModelPath = null;

        async function loadModels() {
            const modelList = document.getElementById('modelList');
            modelList.innerHTML = '<li>Cargando modelos...</li>';

            if (owner === 'tuusuario' || repo === 'tunombre-repo') {
                modelList.innerHTML = '<li>Configura tu usuario y repositorio en el código fuente.</li>';
                return;
            }

            try {
                const glbFiles = [];
                await fetchModelsRecursively('Modelos', glbFiles);

                if (glbFiles.length === 0) {
                    modelList.innerHTML = '<li>No se encontraron archivos .glb en la carpeta Modelos.</li>';
                    return;
                }

                modelList.innerHTML = '';
                glbFiles.forEach(file => {
                    const li = document.createElement('li');
                    li.textContent = file.relativePath;
                    li.onclick = () => loadModel(file.path);
                    modelList.appendChild(li);
                });

                // Cargar modelo desde URL o el primero por defecto
                const urlParams = new URLSearchParams(window.location.search);
                const modelParam = urlParams.get('model');
                if (modelParam && glbFiles.some(f => f.path === modelParam)) {
                    loadModel(modelParam);
                } else if (glbFiles.length > 0) {
                    loadModel(glbFiles[0].path);
                }
            } catch (error) {
                console.error(error);
                modelList.innerHTML = `<li>Error al cargar modelos: ${error.message}. Verifica que el repositorio sea público y la configuración sea correcta.</li>`;
            }
        }

        async function fetchModelsRecursively(path, glbFiles) {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`);
            if (!response.ok) {
                throw new Error(`Error ${response.status}: ${response.statusText}`);
            }
            const items = await response.json();

            for (const item of items) {
                if (item.type === 'file' && item.name.endsWith('.glb')) {
                    glbFiles.push({
                        path: item.path,
                        relativePath: item.path.replace('Modelos/', '')
                    });
                } else if (item.type === 'dir') {
                    await fetchModelsRecursively(item.path, glbFiles);
                }
            }
        }

        function loadModel(path) {
            currentModelPath = path;
            const viewer = document.getElementById('modelViewer');
            viewer.src = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;
            // Actualizar URL sin recargar
            const url = new URL(window.location);
            url.searchParams.set('model', path);
            window.history.pushState({}, '', url);
        }

        function shareCurrentModel() {
            if (!currentModelPath) {
                alert('No hay modelo cargado para compartir.');
                return;
            }
            const url = new URL(window.location);
            url.searchParams.set('model', currentModelPath);
            navigator.clipboard.writeText(url.toString()).then(() => {
                alert('Enlace copiado al portapapeles: ' + url.toString());
            }).catch(err => {
                console.error('Error al copiar: ', err);
                // Fallback: mostrar en un campo de texto
                const textArea = document.createElement('textarea');
                textArea.value = url.toString();
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('Enlace copiado al portapapeles: ' + url.toString());
            });
        }

        function openPosePrototype() {
            window.open('pose-prototype.html', '_blank');
        }

        // Cargar modelos al cargar la página
        window.onload = loadModels;
    </script>
</body>
</html>
