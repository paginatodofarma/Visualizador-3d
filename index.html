<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - TodoFarma</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        .viewer-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        model-viewer {
            width: 100%;
            height: 500px;
        }
        .model-list {
            margin-top: 20px;
        }
        .model-list ul {
            list-style: none;
            padding: 0;
        }
        .model-list li {
            margin: 10px 0;
            padding: 10px;
            background: #e9e9e9;
            border-radius: 4px;
            cursor: pointer;
        }
        .model-list li:hover {
            background: #d9d9d9;
        }
        .model-list li.selected {
            background: #a3cef0;
            font-weight: bold;
        }
        #copyLink {
            margin-top: 12px;
        }
        #currentUrl {
            margin-top: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Visualizador 3D de Modelos GLB</h1>
    <div class="viewer-container">
        <model-viewer
            id="modelViewer"
            src="Modelos/prueba.glb"
            alt="Modelo 3D"
            ar
            ar-modes="webxr scene-viewer quick-look"
            ar-scale="auto"
            camera-controls
            auto-rotate
            shadow-intensity="1">
        </model-viewer>
        <div class="model-list">
            <h2>Modelos Disponibles</h2>
            <ul id="modelList"></ul>
            <button id="copyLink">Copiar URL del modelo seleccionado</button>
            <p id="currentUrl"></p>
        </div>
    </div>

    <script>
        const models = [
            'prueba',
            'modelo1',
            'modelo2',
            'modelo3',
            'modelo4',
            'modelo5',
            'modelo6',
            'modelo7',
            'modelo8',
            'modelo9',
            'modelo10'
        ];

        function getBasePath() {
            const path = window.location.pathname;
            const segments = path.split('/').filter(Boolean);
            if (segments.length === 0) return '/';
            // Ruta como /Visualizador-3d o /Visualizador-3d/modelo
            return `/${segments[0]}`;
        }

        function updateCurrentUrl(modelName) {
            const current = `${window.location.origin}${getBasePath()}/${modelName}`;
            document.getElementById('currentUrl').innerText = current;
            return current;
        }

        function loadModel(modelName, pushHistory = true) {
            const viewer = document.getElementById('modelViewer');
            viewer.src = `Modelos/${modelName}.glb`;
            document.querySelectorAll('#modelList li').forEach(li => li.classList.remove('selected'));
            const selected = document.querySelector(`#modelList li[data-name="${modelName}"]`);
            if (selected) selected.classList.add('selected');
            if (pushHistory) {
                const basePath = getBasePath();
                history.pushState(null, '', `${basePath}/${modelName}`);
            }
            updateCurrentUrl(modelName);
        }

        function renderModelList() {
            const modelList = document.getElementById('modelList');
            modelList.innerHTML = '';
            models.forEach(model => {
                const li = document.createElement('li');
                li.textContent = model;
                li.dataset.name = model;
                li.addEventListener('click', () => loadModel(model));
                modelList.appendChild(li);
            });
        }

        window.onload = function() {
            renderModelList();
            const path = window.location.pathname;
            const segments = path.split('/').filter(Boolean);
            const modelName = segments.length > 1 ? segments[1] : 'prueba';
            if (models.includes(modelName)) {
                loadModel(modelName, false);
            } else {
                loadModel('prueba', false);
            }
        };

        window.onpopstate = function() {
            const path = window.location.pathname;
            const segments = path.split('/').filter(Boolean);
            const modelName = segments.length > 1 ? segments[1] : 'prueba';
            if (models.includes(modelName)) {
                loadModel(modelName, false);
            } else {
                loadModel('prueba', false);
            }
        };

        document.getElementById('copyLink').addEventListener('click', () => {
            const modelName = document.querySelector('#modelList li.selected')?.dataset.name || 'prueba';
            const url = updateCurrentUrl(modelName);
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copiada al portapapeles:\n' + url);
            }, () => {
                alert('Error al copiar URL. Usa Ctrl+C para copiar: ' + url);
            });
        });
    </script>
</body>
</html>
