<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test PoseLandmarker MediaPipe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    #container {
      position: relative;
      width: min(90vw, 920px);
      margin-top: 1rem;
    }
    video, canvas {
      width: 100%;
      height: auto;
      border-radius: 8px;
      background: #000;
      display: block;
    }
    #status {
      margin-top: 0.75rem;
      text-align: center;
    }
    .btn {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 5px;
      background: #1a73e8;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h1>Validación PoseLandmarker (MediaPipe) con webcam</h1>
  <div id="container">
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
  </div>
  <div id="status">Abrirás la cámara y MediaPipe comenzará a detectar pose.</div>
  <button id="btnStart" class="btn">Iniciar cámara y detección</button>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusEl = document.getElementById('status');
    let camera = null;

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        statusEl.textContent = 'Pose detectada: ' + results.poseLandmarks.length + ' puntos';
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#00FF00', lineWidth: 4 });
        drawLandmarks(canvasCtx, results.poseLandmarks, { color: '#FF0000', lineWidth: 2 });
      } else {
        statusEl.textContent = 'No se detecta pose. Ajustar cámara/iluminación.';
      }

      canvasCtx.restore();
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      smoothSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults(onResults);

    document.getElementById('btnStart').addEventListener('click', async () => {
      statusEl.textContent = 'Solicitando permiso de cámara...';
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        statusEl.textContent = 'No hay soporte para getUserMedia en este navegador.';
        return;
      }

      camera = new Camera(videoElement, {
        onFrame: async () => {
          await pose.send({ image: videoElement });
        },
        width: 1280,
        height: 720
      });

      try {
        await camera.start();
        statusEl.textContent = 'Cámara activa, detección iniciada.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Error al iniciar cámara: ' + err.message;
      }
    });
  </script>
</body>
</html>
