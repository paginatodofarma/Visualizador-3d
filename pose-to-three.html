<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoseLandmarker + Three.js (Skeleton Rig)</title>
  <link rel="icon" href="data:,">
  <style>
    body { margin: 0; overflow: hidden; background: #111; color: #fff; font-family: Arial, sans-serif; }
    #ui { position: absolute; top: 8px; left: 8px; z-index: 20; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
    #ui button { margin: 2px; padding: 6px 10px; }
    #videoContainer { position: absolute; right: 8px; top: 8px; width: 240px; z-index: 15; border: 2px solid #fff; }
    #videoContainer video { width: 100%; height: auto; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="btnStart">Iniciar cámara</button>
    <button id="btnStop">Detener cámara</button>
    <div id="status">Estado: esperando...</div>
    <div id="logArea" style="margin-top: 8px; color: #0f0; font-size: 13px; white-space: pre-wrap; max-height: 120px; overflow-y: auto;"></div>
    <p>Modifica `modelPath` en el código si necesitas otro GLB.</p>
  </div>

  <div id="videoContainer"><video id="input_video" autoplay playsinline></video></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

  <script>
    function logUI(msg, isError=false) {
      const logArea = document.getElementById('logArea');
      if (!logArea) return;
      const line = document.createElement('div');
      line.textContent = msg;
      line.style.color = isError ? '#f88' : '#8f8';
      logArea.appendChild(line);
      logArea.scrollTop = logArea.scrollHeight;
    }

    logUI('Script básico cargado - inicio');
    console.log('Script básico cargado - inicio');
  </script>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

    console.log('Module imports de Three.js y dependencias listos');
    console.log('Script pose-to-three.html iniciado correctamente (module)');

    window.onerror = function(message, source, lineno, colno, error) {
      console.error('Window error', message, source, lineno, colno, error);
      logUI('Window error: ' + message, true);
    };

    window.onunhandledrejection = function(e) {
      console.error('Unhandled rejection', e.reason);
      logUI('Unhandled rejection: ' + (e.reason?.message || e.reason), true);
    };

    const modelPath = 'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf'; // Modelo simple de prueba
    const keypointIndices = {
      leftShoulder: 11,
      rightShoulder: 12,
      leftHip: 23,
      rightHip: 24,
      leftElbow: 13,
      rightElbow: 14,
      leftKnee: 25,
      rightKnee: 26
    };

    let camera3D, scene, renderer, controls, skeletonHelper;
    let rig = null;
    let skeleton = null;
    let mpCamera = null;
    let currentLandmarks = null;

    const status = document.getElementById('status');

    function initThree() {
      console.log('initThree() iniciado');
      scene = new THREE.Scene();
      console.log('Escena creada');
      scene.background = new THREE.Color(0x222222);

      camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera3D.position.set(0, 1.6, 3);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera3D, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.update();

      const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
      hemi.position.set(0, 2, 0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(5, 10, 7);
      scene.add(dir);

      const grid = new THREE.GridHelper(10, 20, 0x888888, 0x444444);
      scene.add(grid);

      window.addEventListener('resize', onResize);

      console.log('Iniciando carga de modelo desde:', modelPath);
      const loader = new GLTFLoader();
      loader.load(modelPath, gltf => {
        console.log('GLTF cargado exitosamente:', gltf);
        console.log('Escena GLTF:', gltf.scene);
        console.log('Número de hijos en escena:', gltf.scene.children.length);
        rig = gltf.scene;
        let hasSkinnedMesh = false;
        rig.traverse(child => {
          console.log('Procesando child:', child.type, child.name, 'visible:', child.visible);
          if (child.isSkinnedMesh) {
            console.log('Encontrado SkinnedMesh:', child.name, 'con skeleton:', !!child.skeleton);
            child.castShadow = true;
            child.receiveShadow = true;
            skeleton = child.skeleton;
            hasSkinnedMesh = true;
          } else if (child.isMesh) {
            console.log('Encontrado Mesh:', child.name, 'geometría:', !!child.geometry, 'material:', !!child.material);
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        console.log('Agregando rig a escena...');
        scene.add(rig);

        if (skeleton) {
          console.log('Creando SkeletonHelper...');
          const skel = new THREE.SkeletonHelper(rig);
          skel.material.linewidth = 2;
          scene.add(skel);
          skeletonHelper = skel;
          console.log('SkeletonHelper agregado.');
          status.textContent = 'Modelo cargado con esqueleto. Inicializa la cámara.';
        } else {
          console.log('No se detectó skeleton (SkinnedMesh).');
          status.textContent = 'Modelo cargado (sin esqueleto). Inicializa la cámara.';
        }

        const box = new THREE.Box3().setFromObject(rig);
        const size = box.getSize(new THREE.Vector3()).length();
        const center = box.getCenter(new THREE.Vector3());
        controls.maxDistance = size * 10;
        rig.position.set(-center.x, -center.y, -center.z);
        console.log('Modelo centrado en:', center, 'tamaño:', size);
        console.log('Carga completa. Estado final:', status.textContent);
      }, progress => {
        const percent = (progress.loaded / progress.total * 100).toFixed(2);
        console.log('Progreso de carga:', percent + '%', 'loaded:', progress.loaded, 'total:', progress.total);
        status.textContent = 'Cargando modelo: ' + percent + '%';
      }, error => {
        console.error('Error completo cargando modelo:', error);
        console.error('URL del modelo:', modelPath);
        console.error('Mensaje de error:', error.message);
        console.error('Stack:', error.stack);
        status.textContent = 'Error cargando modelo: ' + error.message;
      });

      animate();
    }

    function onResize() {
      if (!camera3D || !renderer) return;
      camera3D.aspect = window.innerWidth / window.innerHeight;
      camera3D.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      if (!scene || !camera3D || !renderer) {
        // aún no inicializado, espera
        return;
      }
      if (rig && currentLandmarks) {
        applyPoseToRig(currentLandmarks);
      }
      renderer.render(scene, camera3D);
      if (!window.loggedRender) {
        console.log('Primer render ejecutado. Escena con', scene.children.length, 'objetos');
        logUI('Primer render ejecutado. Escena con ' + scene.children.length + ' objetos');
        window.loggedRender = true;
      }
    }

    function getPoint(i) {
      const p = currentLandmarks[i];
      return new THREE.Vector3((p.x - 0.5) * 2, (0.5 - p.y) * 2, -p.z * 2);
    }

    function applyPoseToRig(landmarks) {
      if (!rig || !skeleton) return;

      const leftShoulder = getPoint(keypointIndices.leftShoulder);
      const rightShoulder = getPoint(keypointIndices.rightShoulder);
      const leftHip = getPoint(keypointIndices.leftHip);
      const rightHip = getPoint(keypointIndices.rightHip);

      const shoulderDir = new THREE.Vector3().subVectors(rightShoulder, leftShoulder).normalize();
      const hipDir = new THREE.Vector3().subVectors(rightHip, leftHip).normalize();

      const spineBone = skeleton.bones.find(b => /spine/i.test(b.name));
      if (spineBone) {
        const target = new THREE.Vector3().addVectors(leftHip, rightHip).multiplyScalar(0.5);
        spineBone.position.lerp(target, 0.1);
      }

      mapJointToBone(skeleton, 'LeftShoulder', leftShoulder, leftHip);
      mapJointToBone(skeleton, 'RightShoulder', rightShoulder, rightHip);
      mapJointToBone(skeleton, 'LeftUpperArm', getPoint(keypointIndices.leftElbow), leftShoulder);
      mapJointToBone(skeleton, 'RightUpperArm', getPoint(keypointIndices.rightElbow), rightShoulder);
      mapJointToBone(skeleton, 'LeftUpperLeg', getPoint(keypointIndices.leftKnee), leftHip);
      mapJointToBone(skeleton, 'RightUpperLeg', getPoint(keypointIndices.rightKnee), rightHip);

      if (skeletonHelper) skeletonHelper.update();
    }

    function mapJointToBone(skeleton, boneName, dstPoint, srcPoint) {
      const bone = skeleton.bones.find(b => new RegExp(boneName, 'i').test(b.name));
      if (!bone || !dstPoint || !srcPoint) return;

      const dir = new THREE.Vector3().subVectors(dstPoint, srcPoint).normalize();
      const defaultDir = new THREE.Vector3(0, 1, 0);
      const quaternion = new THREE.Quaternion().setFromUnitVectors(defaultDir, dir);
      bone.quaternion.slerp(quaternion, 0.25);
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults(result => {
      if (result.poseLandmarks) {
        currentLandmarks = result.poseLandmarks;
        status.textContent = 'Pose detectada con ' + result.poseLandmarks.length + ' landmarks.';
      } else {
        status.textContent = 'No se detectó pose.';
      }
    });

    document.getElementById('btnStart').addEventListener('click', async () => {
      status.textContent = 'Iniciando cámara...';
      const videoEl = document.getElementById('input_video');

      if (typeof Camera === 'undefined') {
        const errMsg = 'MediaPipe Camera no está disponible. Revisa que tus scripts de MediaPipe estén cargados.';
        console.error(errMsg);
        status.textContent = errMsg;
        logUI(errMsg, true);
        return;
      }

      try {
        if (mpCamera && mpCamera.stop) {
          console.log('Deteniendo cámara previa antes de iniciar de nuevo');
          await mpCamera.stop();
        }

        mpCamera = new Camera(videoEl, {
          onFrame: async () => await pose.send({ image: videoEl }),
          width: 1280,
          height: 720
        });

        await mpCamera.start();
        videoEl.muted = true;
        videoEl.play().catch(() => {});

        status.textContent = 'Cámara activa. Detectando pose...';
        logUI('Cámara iniciada correctamente');
      } catch (err) {
        console.error('error al iniciar cámara', err);
        status.textContent = 'No se pudo iniciar la cámara: ' + (err.message || err);
        logUI('No se pudo iniciar la cámara: ' + (err.message || err), true);
      }
    });

    document.getElementById('btnStop').addEventListener('click', () => {
      if (mpCamera) {
        mpCamera.stop();
        status.textContent = 'Cámara detenida.';
      }
      const videoEl = document.getElementById('input_video');
      if (videoEl.srcObject) {
        videoEl.srcObject.getTracks().forEach(track => track.stop());
        videoEl.srcObject = null;
      }
      currentLandmarks = null;
    });

    // Cargar modelos al cargar la página
    window.onload = () => {
      console.log('window.onload ejecutado');
      try {
        initThree();
        console.log('initThree() llamado sin errores');
      } catch (error) {
        console.error('Error en initThree():', error);
        status.textContent = 'Error inicializando Three.js: ' + error.message;
      }
    };
</body>
</html>
