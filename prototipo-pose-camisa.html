<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Pose + Camisa 3D</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        #image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            pointer-events: none;
            display: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px;
            border-radius: 8px;
            z-index: 100;
            width: 320px;
            max-height: 75vh;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.25s ease;
        }
        #controls.collapsed {
            transform: translateX(-320px);
        }
        #controls header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        #controls .toggle-button {
            background: #444;
            border: 1px solid #666;
            padding: 4px 8px;
            font-size: 0.8em;
            cursor: pointer;
        }
        .color-picker {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }
        .color-option.selected {
            border: 3px solid #007bff;
        }
        button {
            margin: 5px;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay muted></video>
        <img id="image" style="display:none;" />
        <canvas id="canvas3d"></canvas>
        <canvas id="overlay"></canvas>
        <div id="controls">
            <header>
                <h3 style="margin:0;">Prototipo Camisa Virtual</h3>
                <button class="toggle-button" onclick="toggleControls()">⇔</button>
            </header>
            <button onclick="togglePoseDetection()">Iniciar/Detener Detección</button>
            <button onclick="resetDetection()">Reiniciar Detección</button>
            <button onclick="toggleSkeleton()">Mostrar/Ocultar Esqueleto</button>
            <button onclick="toggleShirt()">Mostrar/Ocultar Camisa</button>
            <button onclick="showCalibration()">Mostrar Configuraciones</button>
            <button onclick="copyConfig()">Copiar Configuración</button>
            <div>
                <label>Color de la camisa:</label>
                <div class="color-picker">
                    <div class="color-option selected" style="background-color: #ffffff;" onclick="changeShirtColor(0xffffff, this)"></div>
                    <div class="color-option" style="background-color: #ff0000;" onclick="changeShirtColor(0xff0000, this)"></div>
                    <div class="color-option" style="background-color: #00ff00;" onclick="changeShirtColor(0x00ff00, this)"></div>
                    <div class="color-option" style="background-color: #0000ff;" onclick="changeShirtColor(0x0000ff, this)"></div>
                    <div class="color-option" style="background-color: #ffff00;" onclick="changeShirtColor(0xffff00, this)"></div>
                    <div class="color-option" style="background-color: #ff00ff;" onclick="changeShirtColor(0xff00ff, this)"></div>
                </div>
            </div>
            <div>
                <label>Cargar Imagen para Detección:</label>
                <input type="file" id="imageInput" accept="image/*" onchange="loadImage(event)">
                <button onclick="switchToVideo()">Volver a Video</button>
            </div>
            <details>
                <summary>Calibración de Partes</summary>
                <div id="calibration">
                    <h4>Torso</h4>
                    <label>X: <input type="range" id="torsoX" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('torso', 'x', this.value)"></label>
                    <label>Y: <input type="range" id="torsoY" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('torso', 'y', this.value)"></label>
                    <label>Z: <input type="range" id="torsoZ" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('torso', 'z', this.value)"></label>
                    <label>Rot: <input type="range" id="torsoRot" min="-3.14" max="3.14" step="0.01" value="0" oninput="updateCalibration('torso', 'rot', this.value)"></label>
                    <label>ScaleX: <input type="range" id="torsoScaleX" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('torso', 'scaleX', this.value)"></label>
                    <label>ScaleY: <input type="range" id="torsoScaleY" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('torso', 'scaleY', this.value)"></label>

                    <h4>Manga Izquierda</h4>
                    <label>X: <input type="range" id="sleeveLeftX" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('sleeveLeft', 'x', this.value)"></label>
                    <label>Y: <input type="range" id="sleeveLeftY" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('sleeveLeft', 'y', this.value)"></label>
                    <label>Z: <input type="range" id="sleeveLeftZ" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('sleeveLeft', 'z', this.value)"></label>
                    <label>Rot: <input type="range" id="sleeveLeftRot" min="-3.14" max="3.14" step="0.01" value="0" oninput="updateCalibration('sleeveLeft', 'rot', this.value)"></label>
                    <label>ScaleX: <input type="range" id="sleeveLeftScaleX" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('sleeveLeft', 'scaleX', this.value)"></label>
                    <label>ScaleY: <input type="range" id="sleeveLeftScaleY" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('sleeveLeft', 'scaleY', this.value)"></label>

                    <h4>Manga Derecha</h4>
                    <label>X: <input type="range" id="sleeveRightX" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('sleeveRight', 'x', this.value)"></label>
                    <label>Y: <input type="range" id="sleeveRightY" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('sleeveRight', 'y', this.value)"></label>
                    <label>Z: <input type="range" id="sleeveRightZ" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('sleeveRight', 'z', this.value)"></label>
                    <label>Rot: <input type="range" id="sleeveRightRot" min="-3.14" max="3.14" step="0.01" value="0" oninput="updateCalibration('sleeveRight', 'rot', this.value)"></label>
                    <label>ScaleX: <input type="range" id="sleeveRightScaleX" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('sleeveRight', 'scaleX', this.value)"></label>
                    <label>ScaleY: <input type="range" id="sleeveRightScaleY" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('sleeveRight', 'scaleY', this.value)"></label>

                    <h4>Cuello</h4>
                    <label>X: <input type="range" id="neckX" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('neck', 'x', this.value)"></label>
                    <label>Y: <input type="range" id="neckY" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('neck', 'y', this.value)"></label>
                    <label>Z: <input type="range" id="neckZ" min="-1" max="1" step="0.01" value="0" oninput="updateCalibration('neck', 'z', this.value)"></label>
                    <label>Rot: <input type="range" id="neckRot" min="-3.14" max="3.14" step="0.01" value="0" oninput="updateCalibration('neck', 'rot', this.value)"></label>
                    <label>ScaleX: <input type="range" id="neckScaleX" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('neck', 'scaleX', this.value)"></label>
                    <label>ScaleY: <input type="range" id="neckScaleY" min="0.1" max="3" step="0.01" value="1" oninput="updateCalibration('neck', 'scaleY', this.value)"></label>

                    <h4>Calibración de esqueleto (X, Y offset)</h4>
                    <div id="skeletonCalibrationControls">
                        <label>Hombro Izquierdo: <input type="number" id="skLeftShoulderX" step="0.01" value="0" onchange="updateSkeletonOffset(11, 'x', this.value)">  <input type="number" id="skLeftShoulderY" step="0.01" value="0" onchange="updateSkeletonOffset(11, 'y', this.value)"></label>
                        <label>Hombro Derecho: <input type="number" id="skRightShoulderX" step="0.01" value="0" onchange="updateSkeletonOffset(12, 'x', this.value)">  <input type="number" id="skRightShoulderY" step="0.01" value="0" onchange="updateSkeletonOffset(12, 'y', this.value)"></label>
                        <label>Codo Izquierdo: <input type="number" id="skLeftElbowX" step="0.01" value="0" onchange="updateSkeletonOffset(13, 'x', this.value)">  <input type="number" id="skLeftElbowY" step="0.01" value="0" onchange="updateSkeletonOffset(13, 'y', this.value)"></label>
                        <label>Codo Derecho: <input type="number" id="skRightElbowX" step="0.01" value="0" onchange="updateSkeletonOffset(14, 'x', this.value)">  <input type="number" id="skRightElbowY" step="0.01" value="0" onchange="updateSkeletonOffset(14, 'y', this.value)"></label>
                        <label>Muñeca Izquierda: <input type="number" id="skLeftWristX" step="0.01" value="0" onchange="updateSkeletonOffset(15, 'x', this.value)">  <input type="number" id="skLeftWristY" step="0.01" value="0" onchange="updateSkeletonOffset(15, 'y', this.value)"></label>
                        <label>Muñeca Derecha: <input type="number" id="skRightWristX" step="0.01" value="0" onchange="updateSkeletonOffset(16, 'x', this.value)">  <input type="number" id="skRightWristY" step="0.01" value="0" onchange="updateSkeletonOffset(16, 'y', this.value)"></label>
                    </div>
                </div>
            </details>
            <p id="status">Estado: Iniciando...</p>
        </div>
    </div>

    <script>
        // Variables globales
        let pose;
        let camera;
        let scene, camera3d, renderer;
        let shirtMesh;
        let shirtMaterial;
        let overlayCanvas, overlayCtx;
        let isDetecting = false;
        let showShirt = true;
        let showSkeleton = true;
        let currentColor = 0xffffff;

        // Calibración
        let calibration = {
            torso: { x: 0, y: 0, z: 0, rot: 0, scaleX: 1, scaleY: 1 },
            sleeveLeft: { x: 0, y: 0, z: 0, rot: 0, scaleX: 1, scaleY: 1 },
            sleeveRight: { x: 0, y: 0, z: 0, rot: 0, scaleX: 1, scaleY: 1 },
            neck: { x: 0, y: 0, z: 0, rot: 0, scaleX: 1, scaleY: 1 }
        };

        // Modo imagen
        let useImage = false;
        let currentImage = null;
        // Estado de inicialización de MediaPipe
        let poseReady = false;
        let poseBusy = false;

        // Calibración de esqueleto (offset de landmarks)
        let skeletonOffset = {
            11: { x: 0, y: 0 }, // left shoulder
            12: { x: 0, y: 0 }, // right shoulder
            13: { x: 0, y: 0 }, // left elbow
            14: { x: 0, y: 0 }, // right elbow
            15: { x: 0, y: 0 }, // left wrist
            16: { x: 0, y: 0 }  // right wrist
        };
        // Inicializar Three.js
        function initThreeJS() {
            try {
                // Verificar que el canvas existe
                const canvas = document.getElementById('canvas3d');
                if (!canvas) {
                    throw new Error('Canvas 3D no encontrado');
                }

                // Verificar WebGL
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) {
                    throw new Error('WebGL no está soportado en este dispositivo');
                }

                // Escena
                scene = new THREE.Scene();

                // Cámara
                camera3d = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera3d.position.z = 5;

                // Renderer
                renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0); // Fondo transparente

                // Luz
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(0, 1, 1);
                scene.add(directionalLight);

                // Crear camisa básica con geometría personalizada
                createShirtMesh();

                // Configurar canvas de overlay para esqueleto
                overlayCanvas = document.getElementById('overlay');
                overlayCtx = overlayCanvas.getContext('2d');
                overlayCanvas.width = window.innerWidth;
                overlayCanvas.height = window.innerHeight;

                // Animar
                animate();

                console.log('Three.js inicializado correctamente');
            } catch (error) {
                console.error('Error inicializando Three.js:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message + '. Intenta en otro navegador.';
            }
        }

        // Crear camisa básica con geometría personalizada
        function createShirtMesh() {
            shirtMesh = new THREE.Group();

            // Material de la camisa
            shirtMaterial = new THREE.MeshLambertMaterial({
                color: currentColor,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });

            // Torso (rectángulo principal)
            const torsoGeometry = new THREE.PlaneGeometry(1, 1.2);
            const torso = new THREE.Mesh(torsoGeometry, shirtMaterial);
            torso.position.z = 0.01; // Delante del cuerpo
            torso.name = 'torso';
            shirtMesh.add(torso);

            // Manga izquierda
            const sleeveLeftGeometry = new THREE.PlaneGeometry(0.3, 0.6);
            const sleeveLeft = new THREE.Mesh(sleeveLeftGeometry, shirtMaterial);
            sleeveLeft.position.set(-0.5, 0.2, 0.01);
            sleeveLeft.name = 'sleeveLeft';
            shirtMesh.add(sleeveLeft);

            // Manga derecha
            const sleeveRightGeometry = new THREE.PlaneGeometry(0.3, 0.6);
            const sleeveRight = new THREE.Mesh(sleeveRightGeometry, shirtMaterial);
            sleeveRight.position.set(0.5, 0.2, 0.01);
            sleeveRight.name = 'sleeveRight';
            shirtMesh.add(sleeveRight);

            // Cuello (óvalo simple)
            const neckGeometry = new THREE.CircleGeometry(0.15, 8);
            const neck = new THREE.Mesh(neckGeometry, shirtMaterial);
            neck.position.set(0, 0.5, 0.01);
            neck.name = 'neck';
            shirtMesh.add(neck);

            shirtMesh.visible = showShirt;
            scene.add(shirtMesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera3d);
        }

        // Inicializar MediaPipe Pose
        function initPose() {
            try {
                // Evitar inicialización múltiple
                if (pose) {
                    console.log('MediaPipe ya inicializado');
                    return;
                }

                console.log('Inicializando MediaPipe Pose...');
                pose = new Pose({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
                    }
                });

                pose.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    enableSegmentation: false,
                    smoothSegmentation: false,
                    minDetectionConfidence: 0.3, // Reducido para mejor detección
                    minTrackingConfidence: 0.3   // Reducido para mejor tracking
                });

                pose.onResults(onResults);

                // Inicializar estado y cámara una sola vez
                poseReady = true;
                console.log('MediaPipe Pose listo');

                const videoElement = document.getElementById('video');
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        if (isDetecting && poseReady && pose && !useImage && !poseBusy) {
                            poseBusy = true;
                            try {
                                await pose.send({ image: videoElement });
                            } catch (error) {
                                console.error('Error enviando frame a MediaPipe:', error);
                                // No detener detección por errores temporales
                            } finally {
                                poseBusy = false;
                            }
                        }
                    },
                    width: 640,
                    height: 480
                });

                document.getElementById('status').textContent = 'Estado: MediaPipe cargado. Haz clic en Iniciar/Detener Detección';

            } catch (error) {
                console.error('Error en initPose:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
            }
        }

        let detectionStatus = false;

        // Procesar resultados de pose
        function onResults(results) {
            try {
                if (!results || !results.poseLandmarks) {
                    if (detectionStatus) {
                        detectionStatus = false;
                        document.getElementById('status').textContent = 'Estado: Pose no detectada';
                        console.log('Pose perdida');
                    }
                    return;
                }

                if (!detectionStatus) {
                    detectionStatus = true;
                    document.getElementById('status').textContent = 'Estado: Pose detectada ✓';
                    console.log('Pose detectada');
                }

                // Actualizar posición de la camisa
                updateShirtPosition(results.poseLandmarks);

                // Dibujar esqueleto sobre el overlay si está habilitado
                if (showSkeleton && overlayCtx) {
                    drawSkeleton(results.poseLandmarks);
                } else if (overlayCtx) {
                    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                }
            } catch (error) {
                console.error('Error procesando resultados de pose:', error);
                document.getElementById('status').textContent = 'Error procesando pose: ' + error.message;
            }
        }

        // Dibujar esqueleto 2D en overlay
        function drawSkeleton(landmarks) {
            if (!overlayCtx || !overlayCanvas) return;

            const sourceElement = useImage ? document.getElementById('image') : document.getElementById('video');
            if (!sourceElement) return;

            const sourceRect = sourceElement.getBoundingClientRect();
            const scaleX = sourceRect.width;
            const scaleY = sourceRect.height;
            const offsetX = sourceRect.left;
            const offsetY = sourceRect.top;

            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 7], // cara
                [0, 4], [4, 5], [5, 6], [6, 8],
                [9, 10], [11, 12],
                [11, 13], [13, 15], [15, 17], // brazo izquierdo
                [12, 14], [14, 16], [16, 18], // brazo derecho
                [11, 23], [12, 24],
                [23, 24], [23, 25], [25, 27],
                [24, 26], [26, 28],
                [27, 29], [29, 31], [28, 30], [30, 32]
            ];

            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            overlayCtx.strokeStyle = 'rgba(0,255,0,0.8)';
            overlayCtx.lineWidth = 2;

            for (const [i, j] of connections) {
                const a = landmarks[i];
                const b = landmarks[j];
                if (!a || !b) continue;
                const ax = (a.x + (skeletonOffset[i]?.x || 0)) * scaleX + offsetX;
                const ay = (a.y + (skeletonOffset[i]?.y || 0)) * scaleY + offsetY;
                const bx = (b.x + (skeletonOffset[j]?.x || 0)) * scaleX + offsetX;
                const by = (b.y + (skeletonOffset[j]?.y || 0)) * scaleY + offsetY;
                overlayCtx.beginPath();
                overlayCtx.moveTo(ax, ay);
                overlayCtx.lineTo(bx, by);
                overlayCtx.stroke();
            }

            overlayCtx.fillStyle = 'rgba(255,255,255,0.8)';
            overlayCtx.font = '12px Arial';
            overlayCtx.textAlign = 'center';
            overlayCtx.textBaseline = 'top';
            for (let index = 0; index < landmarks.length; index++) {
                const lm = landmarks[index];
                if (!lm) continue;
                const lx = (lm.x + (skeletonOffset[index]?.x || 0)) * scaleX + offsetX;
                const ly = (lm.y + (skeletonOffset[index]?.y || 0)) * scaleY + offsetY;
                overlayCtx.beginPath();
                overlayCtx.arc(lx, ly, 4, 0, Math.PI * 2);
                overlayCtx.fill();
                if (skeletonOffset[index]) {
                    overlayCtx.fillStyle = 'rgba(255,0,0,0.9)';
                    overlayCtx.fillText(index, lx, ly + 5);
                    overlayCtx.fillStyle = 'rgba(255,255,255,0.8)';
                }
            }
        }

        // Actualizar posición de la camisa basada en landmarks
        function updateShirtPosition(landmarks) {
            if (!shirtMesh || !showShirt) return;

            // Obtener referencias a las partes de la camisa por nombre
            const torso = shirtMesh.getObjectByName('torso');
            const sleeveLeft = shirtMesh.getObjectByName('sleeveLeft');
            const sleeveRight = shirtMesh.getObjectByName('sleeveRight');
            const neck = shirtMesh.getObjectByName('neck');

            // Landmarks clave
            const nose = landmarks[0];
            const leftShoulder = landmarks[11];
            const rightShoulder = landmarks[12];
            const leftElbow = landmarks[13];
            const rightElbow = landmarks[14];
            const leftWrist = landmarks[15];
            const rightWrist = landmarks[16];
            const leftHip = landmarks[23];
            const rightHip = landmarks[24];

            if (leftShoulder && rightShoulder && leftHip && rightHip) {
                // Calcular centros y dimensiones
                const shoulderCenterX = (leftShoulder.x + rightShoulder.x) / 2;
                const shoulderCenterY = (leftShoulder.y + rightShoulder.y) / 2;
                const hipCenterX = (leftHip.x + rightHip.x) / 2;
                const hipCenterY = (leftHip.y + rightHip.y) / 2;
                const torsoCenterX = (shoulderCenterX + hipCenterX) / 2;
                const torsoCenterY = (shoulderCenterY + hipCenterY) / 2;

                const shoulderWidth = Math.abs(rightShoulder.x - leftShoulder.x);
                const torsoHeight = Math.abs(shoulderCenterY - hipCenterY);
                const avgZ = (leftShoulder.z + rightShoulder.z + leftHip.z + rightHip.z) / 4;

                // Profundidad y escala global
                const depthFactor = THREE.MathUtils.clamp(1.0 / (avgZ + 0.45), 0.7, 2.2);
                const globalScaleX = shoulderWidth * 2.0 * depthFactor;
                const globalScaleY = torsoHeight * 1.8 * depthFactor;

                // Posición global de la camisa (centro del torso)
                const targetX = (torsoCenterX - 0.5) * 2.0;
                const targetY = -(torsoCenterY - 0.5) * 2.0;
                const shirtZ = THREE.MathUtils.clamp(1.0 - (avgZ * 2.0), -0.5, 1.5);
                shirtMesh.position.set(targetX, targetY, shirtZ);

                // Guardar posición de ropa para información
                const shirtInfo = {
                    x: targetX,
                    y: targetY,
                    z: shirtZ,
                    width: globalScaleX,
                    height: globalScaleY
                };
                if (document.getElementById('status')) {
                    document.getElementById('status').textContent = `Estado: Pose detectada ✓ | Camisa en (${shirtInfo.x.toFixed(2)}, ${shirtInfo.y.toFixed(2)}, ${shirtInfo.z.toFixed(2)})`;
                }

                // Rotación del torso
                const shoulderAngle = Math.atan2(rightShoulder.y - leftShoulder.y, rightShoulder.x - leftShoulder.x);
                const hipAngle = Math.atan2(rightHip.y - leftHip.y, rightHip.x - leftHip.x);
                shirtMesh.rotation.z = (shoulderAngle + hipAngle) / 2;

                // Ajuste de posición Y basado en nariz para evitar superposición
                if (nose) {
                    const neckOffset = (nose.y - shoulderCenterY) * 1.0;
                    shirtMesh.position.y -= neckOffset;
                }

                // Actualizar torso
                if (torso) {
                    torso.scale.set(globalScaleX * calibration.torso.scaleX, globalScaleY * calibration.torso.scaleY, 1);
                    torso.position.set(calibration.torso.x, calibration.torso.y, calibration.torso.z + 0.01);
                    torso.rotation.z = calibration.torso.rot;
                }

                // Actualizar cuello
                if (neck && nose) {
                    const neckX = (nose.x - torsoCenterX) * globalScaleX + calibration.neck.x;
                    const neckY = (nose.y - torsoCenterY) * globalScaleY + calibration.neck.y;
                    neck.position.set(neckX, neckY + 0.1, calibration.neck.z + 0.01);
                    neck.rotation.z = calibration.neck.rot;
                    neck.scale.set(calibration.neck.scaleX, calibration.neck.scaleY, 1);
                }

                // Actualizar mangas
                if (sleeveLeft && leftElbow && leftShoulder) {
                    const sleeveX = (leftElbow.x - torsoCenterX) * globalScaleX + calibration.sleeveLeft.x;
                    const sleeveY = (leftElbow.y - torsoCenterY) * globalScaleY + calibration.sleeveLeft.y;
                    sleeveLeft.position.set(sleeveX, sleeveY, calibration.sleeveLeft.z + 0.01);
                    // Rotación basada en el brazo
                    const armAngle = Math.atan2(leftElbow.y - leftShoulder.y, leftElbow.x - leftShoulder.x);
                    sleeveLeft.rotation.z = armAngle + calibration.sleeveLeft.rot;
                    sleeveLeft.scale.set(calibration.sleeveLeft.scaleX, calibration.sleeveLeft.scaleY, 1);
                }

                if (sleeveRight && rightElbow && rightShoulder) {
                    const sleeveX = (rightElbow.x - torsoCenterX) * globalScaleX + calibration.sleeveRight.x;
                    const sleeveY = (rightElbow.y - torsoCenterY) * globalScaleY + calibration.sleeveRight.y;
                    sleeveRight.position.set(sleeveX, sleeveY, calibration.sleeveRight.z + 0.01);
                    // Rotación basada en el brazo
                    const armAngle = Math.atan2(rightElbow.y - rightShoulder.y, rightElbow.x - rightShoulder.x);
                    sleeveRight.rotation.z = armAngle + calibration.sleeveRight.rot;
                    sleeveRight.scale.set(calibration.sleeveRight.scaleX, calibration.sleeveRight.scaleY, 1);
                }
            }
        }

        // Funciones de control
        function togglePoseDetection() {
            try {
                if (!pose) {
                    document.getElementById('status').textContent = 'Error: MediaPipe no inicializado';
                    return;
                }

                isDetecting = !isDetecting;
                document.getElementById('status').textContent = isDetecting ? 'Estado: Detectando pose...' : 'Estado: Detección detenida';

                if (isDetecting) {
                    if (camera) {
                        camera.start();
                    } else {
                        document.getElementById('status').textContent = 'Error: Cámara no disponible';
                        isDetecting = false;
                    }
                } else {
                    if (camera) {
                        camera.stop();
                    }
                }
            } catch (error) {
                console.error('Error al cambiar detección:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
                isDetecting = false;
            }
        }

        function toggleControls() {
            const controls = document.getElementById('controls');
            controls.classList.toggle('collapsed');
        }

        function toggleSkeleton() {
            showSkeleton = !showSkeleton;
            if (!showSkeleton && overlayCtx) {
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            }
            document.getElementById('status').textContent = showSkeleton ? 'Estado: Esqueleto activado' : 'Estado: Esqueleto desactivado';
        }

        function changeShirtColor(color, element) {
            currentColor = color;
            if (shirtMaterial) {
                shirtMaterial.color.setHex(color);
            }
            // Actualizar selección visual
            document.querySelectorAll('.color-option').forEach(option => {
                option.classList.remove('selected');
            });
            if (element) {
                element.classList.add('selected');
            }
        }

        function updateCalibration(part, prop, value) {
            calibration[part][prop] = parseFloat(value);
        }

        function updateSkeletonOffset(index, prop, value) {
            if (!skeletonOffset[index]) {
                skeletonOffset[index] = { x: 0, y: 0 };
            }
            skeletonOffset[index][prop] = parseFloat(value);
        }

        function showCalibration() {
            console.log('Configuraciones actuales:', { calibration, skeletonOffset });
            alert('Revisa la consola (F12 > Console) para ver las configuraciones actuales.');
        }

        function copyConfig() {
            const data = JSON.stringify({ calibration, skeletonOffset }, null, 2);
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(data).then(() => {
                    alert('Configuración copiada al portapapeles.');
                }).catch((err) => {
                    console.error('Error copiando config:', err);
                    alert('No se pudo copiar al portapapeles. Abre la consola y copia manualmente.');
                });
            } else {
                console.warn('Clipboard API no disponible');
                console.log(data);
                alert('No hay acceso al portapapeles. Revisa la consola.');
            }
        }

        function loadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (camera && isDetecting) {
                camera.stop();
                isDetecting = false;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                currentImage = new Image();
                currentImage.onload = function() {
                    useImage = true;
                    document.getElementById('video').style.display = 'none';
                    document.getElementById('image').src = e.target.result;
                    document.getElementById('image').style.display = 'block';
                    // Procesar pose en la imagen
                    processImagePose();
                };
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function switchToVideo() {
            useImage = false;
            document.getElementById('video').style.display = 'block';
            document.getElementById('image').style.display = 'none';
            currentImage = null;
            if (camera) {
                // Reiniciar cámara para continuar detección
                camera.start();
                isDetecting = true;
            }
            // Limpiar overlay si es necesario
            if (overlayCtx) {
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            }
        }

        async function processImagePose() {
            if (!pose || !currentImage || !poseReady || poseBusy) return;
            poseBusy = true;
            try {
                await pose.send({ image: currentImage });
                // onResults se ejecuta automáticamente cuando llega la predicción
            } catch (error) {
                console.error('Error procesando imagen:', error);
            } finally {
                poseBusy = false;
            }
        }

        function toggleShirt() {
            showShirt = !showShirt;
            if (shirtMesh) {
                shirtMesh.visible = showShirt;
            }
        }

        function resetDetection() {
            try {
                // Detener la detección actual
                isDetecting = false;
                detectionStatus = false;

                // Detener la cámara si está activa
                if (camera) {
                    camera.stop();
                }

                // Resetear la posición de la camisa
                if (shirtMesh) {
                    shirtMesh.position.set(0, 0, 0);
                    shirtMesh.rotation.set(0, 0, 0);
                    shirtMesh.scale.set(1, 1, 1);
                }

                // No cerrar pose completamente, solo resetear estado
                document.getElementById('status').textContent = 'Estado: Reiniciado. Haz clic en "Iniciar Detección"';
                console.log('Detección reiniciada');
            } catch (error) {
                console.error('Error al reiniciar:', error);
                document.getElementById('status').textContent = 'Error al reiniciar: ' + error.message;
            }
        }

        // Inicializar todo
        window.onload = function() {
            initThreeJS();
            initPose();
            document.getElementById('status').textContent = 'Estado: Listo. Haz clic en "Iniciar Detección"';
        };

        // Manejar resize
        window.addEventListener('resize', () => {
            if (!camera3d || !renderer) return;

            try {
                camera3d.aspect = window.innerWidth / window.innerHeight;
                camera3d.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (overlayCanvas) {
                    overlayCanvas.width = window.innerWidth;
                    overlayCanvas.height = window.innerHeight;
                }
            } catch (error) {
                console.error('Error en redimensionamiento:', error);
            }
        });
    </script>
</body>
</html>
