<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Pose + Camisa 3D</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            max-width: 300px;
        }
        .color-picker {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }
        .color-option.selected {
            border: 3px solid #007bff;
        }
        button {
            margin: 5px;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay muted></video>
        <canvas id="canvas3d"></canvas>
        <div id="controls">
            <h3>Prototipo Camisa Virtual</h3>
            <button onclick="togglePoseDetection()">Iniciar/Detener Detección</button>
            <button onclick="toggleShirt()">Mostrar/Ocultar Camisa</button>
            <div>
                <label>Color de la camisa:</label>
                <div class="color-picker">
                    <div class="color-option selected" style="background-color: #ffffff;" onclick="changeShirtColor(0xffffff)"></div>
                    <div class="color-option" style="background-color: #ff0000;" onclick="changeShirtColor(0xff0000)"></div>
                    <div class="color-option" style="background-color: #00ff00;" onclick="changeShirtColor(0x00ff00)"></div>
                    <div class="color-option" style="background-color: #0000ff;" onclick="changeShirtColor(0x0000ff)"></div>
                    <div class="color-option" style="background-color: #ffff00;" onclick="changeShirtColor(0xffff00)"></div>
                    <div class="color-option" style="background-color: #ff00ff;" onclick="changeShirtColor(0xff00ff)"></div>
                </div>
            </div>
            <p id="status">Estado: Iniciando...</p>
        </div>
    </div>

    <script>
        // Variables globales
        let pose;
        let camera;
        let scene, camera3d, renderer;
        let shirtMesh;
        let shirtMaterial;
        let isDetecting = false;
        let showShirt = true;
        let currentColor = 0xffffff;

        // Inicializar Three.js
        function initThreeJS() {
            // Escena
            scene = new THREE.Scene();

            // Cámara
            camera3d = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera3d.position.z = 5;

            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0); // Fondo transparente

            // Luz
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(0, 1, 1);
            scene.add(directionalLight);

        // Crear camisa básica con geometría personalizada
        function createShirtMesh() {
            shirtMesh = new THREE.Group();

            // Material de la camisa
            shirtMaterial = new THREE.MeshLambertMaterial({
                color: currentColor,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });

            // Torso (rectángulo principal)
            const torsoGeometry = new THREE.PlaneGeometry(1, 1.2);
            const torso = new THREE.Mesh(torsoGeometry, shirtMaterial);
            torso.position.z = 0.01; // Delante del cuerpo
            shirtMesh.add(torso);

            // Manga izquierda
            const sleeveLeftGeometry = new THREE.PlaneGeometry(0.3, 0.6);
            const sleeveLeft = new THREE.Mesh(sleeveLeftGeometry, shirtMaterial);
            sleeveLeft.position.set(-0.5, 0.2, 0.01);
            shirtMesh.add(sleeveLeft);

            // Manga derecha
            const sleeveRightGeometry = new THREE.PlaneGeometry(0.3, 0.6);
            const sleeveRight = new THREE.Mesh(sleeveRightGeometry, shirtMaterial);
            sleeveRight.position.set(0.5, 0.2, 0.01);
            shirtMesh.add(sleeveRight);

            // Cuello (óvalo simple)
            const neckGeometry = new THREE.CircleGeometry(0.15, 8);
            const neck = new THREE.Mesh(neckGeometry, shirtMaterial);
            neck.position.set(0, 0.5, 0.01);
            shirtMesh.add(neck);

            shirtMesh.visible = showShirt;
            scene.add(shirtMesh);
        }

            // Animar
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera3d);
        }

        // Inicializar MediaPipe Pose
        function initPose() {
            pose = new Pose({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
                }
            });

            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: false,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            pose.onResults(onResults);

            camera = new Camera(document.getElementById('video'), {
                onFrame: async () => {
                    if (isDetecting) {
                        await pose.send({ image: document.getElementById('video') });
                    }
                },
                width: 640,
                height: 480
            });
        }

        // Procesar resultados de pose
        function onResults(results) {
            if (!results.poseLandmarks) return;

            updateShirtPosition(results.poseLandmarks);
        }

        // Actualizar posición de la camisa basada en landmarks
        function updateShirtPosition(landmarks) {
            if (!shirtMesh || !showShirt) return;

            // Landmarks clave para alineación
            const nose = landmarks[0];
            const leftShoulder = landmarks[11];
            const rightShoulder = landmarks[12];
            const leftElbow = landmarks[13];
            const rightElbow = landmarks[14];
            const leftHip = landmarks[23];
            const rightHip = landmarks[24];
            const leftKnee = landmarks[25];
            const rightKnee = landmarks[26];

            if (leftShoulder && rightShoulder && leftHip && rightHip) {
                // Calcular dimensiones del torso
                const shoulderCenterX = (leftShoulder.x + rightShoulder.x) / 2;
                const shoulderCenterY = (leftShoulder.y + rightShoulder.y) / 2;
                const hipCenterX = (leftHip.x + rightHip.x) / 2;
                const hipCenterY = (leftHip.y + rightHip.y) / 2;

                // Ancho de hombros
                const shoulderWidth = Math.abs(rightShoulder.x - leftShoulder.x);
                // Alto del torso (hombros a caderas)
                const torsoHeight = Math.abs(shoulderCenterY - hipCenterY);
                // Ancho de caderas
                const hipWidth = Math.abs(rightHip.x - leftHip.x);

                // Centro del torso
                const torsoCenterX = (shoulderCenterX + hipCenterX) / 2;
                const torsoCenterY = (shoulderCenterY + hipCenterY) / 2;

                // Profundidad Z promedio
                const avgZ = (leftShoulder.z + rightShoulder.z + leftHip.z + rightHip.z) / 4;

                // Escalar la camisa
                const scaleX = shoulderWidth * 2.5; // Un poco más ancho que los hombros
                const scaleY = torsoHeight * 2.2; // Altura del torso
                shirtMesh.scale.set(scaleX, scaleY, 1);

                // Posicionar la camisa
                shirtMesh.position.x = (torsoCenterX - 0.5) * 6; // Ajustar escala horizontal
                shirtMesh.position.y = -(torsoCenterY - 0.5) * 4; // Invertir Y y ajustar
                shirtMesh.position.z = avgZ * 3;

                // Calcular rotación basada en hombros
                const shoulderAngle = Math.atan2(rightShoulder.y - leftShoulder.y, rightShoulder.x - leftShoulder.x);
                shirtMesh.rotation.z = shoulderAngle;

                // Ajustar inclinación basada en caderas
                const hipAngle = Math.atan2(rightHip.y - leftHip.y, rightHip.x - leftHip.x);
                const torsoTilt = (shoulderAngle + hipAngle) / 2;
                shirtMesh.rotation.z = torsoTilt;

                // Ajustar posición Y para que el cuello esté en el nivel correcto
                if (nose) {
                    const neckOffset = (nose.y - shoulderCenterY) * 2;
                    shirtMesh.position.y += neckOffset;
                }

                // Ajustar mangas basado en codos
                if (shirtMesh.children.length >= 3) {
                    const leftSleeve = shirtMesh.children[1]; // Manga izquierda
                    const rightSleeve = shirtMesh.children[2]; // Manga derecha

                    if (leftElbow) {
                        leftSleeve.position.x = (leftShoulder.x - torsoCenterX) * scaleX;
                        leftSleeve.position.y = (leftShoulder.y - torsoCenterY) * scaleY * 0.5;
                    }

                    if (rightElbow) {
                        rightSleeve.position.x = (rightShoulder.x - torsoCenterX) * scaleX;
                        rightSleeve.position.y = (rightShoulder.y - torsoCenterY) * scaleY * 0.5;
                    }
                }
            }
        }

        // Funciones de control
        function togglePoseDetection() {
            isDetecting = !isDetecting;
            document.getElementById('status').textContent = isDetecting ? 'Estado: Detectando pose...' : 'Estado: Detección detenida';
            if (isDetecting) {
                camera.start();
            } else {
                camera.stop();
            }
        }

        function changeShirtColor(color) {
            currentColor = color;
            if (shirtMaterial) {
                shirtMaterial.color.setHex(color);
            }
            // Actualizar selección visual
            document.querySelectorAll('.color-option').forEach(option => {
                option.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        // Inicializar todo
        window.onload = function() {
            initThreeJS();
            initPose();
            document.getElementById('status').textContent = 'Estado: Listo. Haz clic en "Iniciar Detección"';
        };

        // Manejar resize
        window.addEventListener('resize', () => {
            camera3d.aspect = window.innerWidth / window.innerHeight;
            camera3d.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
